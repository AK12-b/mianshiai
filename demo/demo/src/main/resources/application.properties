spring.application.name=faceai-interview

server.port=8080
server.tomcat.uri-encoding=UTF-8

# 强制 HTTP 响应/请求使用 UTF-8，避免中文乱码
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# 开发期：让 8080 直接读取源码 static，并禁用浏览器缓存
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.cache.cachecontrol.max-age=0

spring.datasource.url=jdbc:mysql://localhost:3306/mianshi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=a2184808
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
# 关闭控制台 SQL 刷屏；需排错时可临时改为 true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 简历上传根目录（必须使用稳定绝对路径）。嵌入式 Tomcat 下 user.dir 会指向临时目录 ROOT，会导致 uploads 路径异常。
# 默认在「用户目录/.interview/uploads」，也可改成任意盘符路径。
app.upload.root=${user.home}/.interview/uploads

qwen.api.key=sk-4bdee6b5e7114c42a232254b53b5a850
qwen.api.url=https://dashscope.aliyuncs.com/compatible-mode/v1

# CosyVoice 语音面试（HTTP SpeechSynthesizer，WAV）；voice + instruction 由 ai_character+ai_gender 映射
# 使用 cosyvoice-v3-flash：系统音色 + Instruct 须为官方句式（见音色列表）。v3.5-flash 无系统音色，勿与 zhitian_emo 等混用。
dashscope.tts.synthesizer-url=https://dashscope.aliyuncs.com/api/v1/services/audio/tts/SpeechSynthesizer
dashscope.tts.model=cosyvoice-v3-flash

# DashScope 应用（智能体）API：POST /api/v1/apps/{app_id}/completion
# 用于将不同业务（面试官/评估官/简历/练习等）路由到不同应用
dashscope.app.ai-interviewer.url=https://dashscope.aliyuncs.com/api/v1/apps/345591575534473a90a658f724042b5f/completion
dashscope.app.interview-evaluator.url=https://dashscope.aliyuncs.com/api/v1/apps/bd473b29da374ef4a709c45d2838680b/completion
dashscope.app.resume-optimizer.url=https://dashscope.aliyuncs.com/api/v1/apps/9d7e5b322b3d4ff6800b283837ca2670/completion
dashscope.app.practice-tutor.url=https://dashscope.aliyuncs.com/api/v1/apps/5d3e8874307a4659b0cb8f390937fd2e/completion
dashscope.app.wrongbook-analyst.url=https://dashscope.aliyuncs.com/api/v1/apps/2113a3b47aa740b8997643dddd1a8966/completion
dashscope.app.growth-analyst.url=https://dashscope.aliyuncs.com/api/v1/apps/f27b17e1eb25424abc89310d4166a8fa/completion
dashscope.app.post-match.url=https://dashscope.aliyuncs.com/api/v1/apps/87be78797c864481ac5603264a7d9172/completion

# 学习资源/题库：点击知识点补「参考答案」时调用的百炼应用 completion（与 qwen.api.key 鉴权）
dashscope.app.question-bank.url=https://dashscope.aliyuncs.com/api/v1/apps/430aa31d19554546a9e6125f6f459daa/completion

# 知识库条目自动分类（百炼智能体 completion 完整 URL，服务端带 qwen.api.key；勿在前端直连，否则会 InvalidApiKey）
# 智能体输出须为 JSON，且包含 category_id：1=专业基础 2=Web前端 3=Java后端 4=大模型算法（与下方约定一致即可）
